<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🔬 나만의 AI 원소 도슨트 (Realtime DB 버전)</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: linear-gradient(135deg, #e3f2fd, #fce4ec); font-family: Arial, sans-serif; color: #333; }
    .container { width: min(900px, 92%); margin: 40px auto; background: #ffffff; border-radius: 24px; padding: 28px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.16); }
    h1 { margin: 0 0 8px; text-align: center; font-size: 28px; }
    .subtitle { text-align: center; color: #777; margin-bottom: 24px; font-size: 14px; }
    .auth-section { background: #f1f3f5; padding: 18px; border-radius: 14px; margin-bottom: 20px; }
    .auth-inputs { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
    .auth-inputs input { flex: 1; min-width: 150px; height: 44px; padding: 0 12px; border: 1px solid #ddd; border-radius: 12px; font-size: 14px; outline: none; }
    .auth-inputs input:focus { border-color: #42a5f5; }
    .auth-status-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
    #user-info { font-weight: bold; font-size: 14px; }
    .element-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(70px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .btn-element { border: 1px solid #ddd; background: #ffffff; color: #333; height: 70px; font-size: 18px; font-weight: bold; border-radius: 14px; cursor: pointer; transition: 0.15s; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .btn-element span { font-size: 11px; font-weight: normal; margin-top: 4px; color: #666; }
    .btn-element:hover, .btn-element.active { background: #42a5f5; color: white; border-color: #42a5f5; transform: translateY(-2px); }
    .option-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    select, input[type="number"] { height: 44px; padding: 0 12px; border: 1px solid #ddd; border-radius: 12px; font-size: 14px; outline: none; }
    select:focus, input[type="number"]:focus { border-color: #42a5f5; box-shadow: 0 0 0 3px rgba(66, 165, 245, 0.15); }
    .label { font-weight: bold; margin-bottom: 6px; font-size: 15px; }
    .button-row { display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap; margin-top: 14px; }
    button, .download-link { border: none; border-radius: 12px; padding: 0 18px; height: 46px; font-size: 15px; cursor: pointer; transition: 0.15s; font-weight: bold; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
    button:hover, .download-link:hover { transform: translateY(-2px); opacity: 0.9; }
    button:disabled { cursor: not-allowed; opacity: 0.6; transform: none; }
    .login-btn { background: #4caf50; color: white; }
    .register-btn { background: #00bcd4; color: white; }
    .logout-btn { background: #e0e0e0; color: #333; }
    .make-btn { background: #42a5f5; color: white; }
    .save-btn { background: #ffb74d; color: white; }
    .download-link { background: #7e57c2; color: white; }
    .hidden { display: none; }
    .status { min-height: 24px; margin-top: 14px; color: #555; font-size: 14px; font-weight: bold; }
    .result-box { margin-top: 20px; padding: 18px; border-radius: 18px; background: #f7f9fb; border: 1px solid #edf1f5; }
    .ai-text-box { background: white; padding: 15px; border-radius: 12px; border: 1px solid #e0e0e0; margin-bottom: 12px; line-height: 1.6; font-size: 15px; }
    audio { width: 100%; margin-top: 10px; }
    .storage-box { margin-top: 24px; padding: 18px; border-radius: 18px; background: #e8f5e9; border: 1px solid #c8e6c9; color: #2e7d32; }
    #my-storage-list { font-weight: bold; margin-top: 6px; }
    @media (max-width: 700px) { .option-box { grid-template-columns: 1fr; } .button-row { justify-content: stretch; } button, .download-link { width: 100%; } }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔬 나만의 AI 원소 도슨트</h1>
    <div class="subtitle">원소를 선택하면 AI가 설명해주고 음성(mp3)으로 들려줍니다</div>

    <div class="auth-section">
      <div id="auth-inputs-div" class="auth-inputs">
        <input type="email" id="emailInput" placeholder="이메일 입력 (ex: test@test.com)" />
        <input type="password" id="passwordInput" placeholder="비밀번호 입력 (6자리 이상)" />
        <button id="loginBtn" class="login-btn">로그인</button>
        <button id="registerBtn" class="register-btn">회원가입</button>
      </div>
      <div class="auth-status-bar">
        <span id="user-info">로그인 후 나만의 원소 보관함을 연동해보세요!</span>
        <button id="logoutBtn" class="logout-btn hidden">로그아웃</button>
      </div>
    </div>

    <div class="label">원소 선택</div>
    <div class="element-grid">
      <button class="btn-element" data-symbol="H" data-name="수소">H<span>수소</span></button>
      <button class="btn-element" data-symbol="He" data-name="헬륨">He<span>헬륨</span></button>
      <button class="btn-element" data-symbol="Li" data-name="리튬">Li<span>리튬</span></button>
      <button class="btn-element" data-symbol="O" data-name="산소">O<span>산소</span></button>
      <button class="btn-element" data-symbol="Au" data-name="금">Au<span>금</span></button>
    </div>

    <div class="option-box">
      <select id="voiceSelect">
        <option value="alloy">익숙한 목소리 (alloy)</option>
        <option value="echo">부드러운 목소리 (echo)</option>
        <option value="fable">개성있는 목소리 (fable)</option>
        <option value="onyx">듬직한 남성 (onyx)</option>
        <option value="nova">차분한 여성 (nova)</option>
        <option value="shimmer">밝은 여성 (shimmer)</option>
      </select>
      <input id="speedInput" type="number" min="0.25" max="4.0" step="0.05" value="1.0" placeholder="재생 속도" />
    </div>

    <div class="button-row">
      <button class="save-btn" id="saveBtn" disabled>⭐ 내 보관함에 저장</button>
      <button class="make-btn" id="makeBtn" disabled>🤖 AI 도슨트 설명 듣기</button>
    </div>

    <div id="status" class="status">원소를 먼저 선택해주세요.</div>

    <div id="resultBox" class="result-box hidden">
      <div class="label" id="resultTitle">🤖 AI 도슨트 가이드</div>
      <div id="aiResponseText" class="ai-text-box"></div>
      <audio id="audioPlayer" controls></audio>
      <div class="button-row">
        <a id="downloadLink" class="download-link" href="#" download="tts-audio.mp3">mp3 다운로드</a>
      </div>
    </div>

    <div class="storage-box">
      <div class="label">⭐ 내가 저장한 원소 목록 (클라우드 동기화)</div>
      <div id="my-storage-list">로그인이 필요합니다.</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    // 🔗 Realtime Database 모듈로 교체 및 바인딩
    import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD5G_j3cOFmE0Dhaqp5LpDROFZ2O29a59g",
      authDomain: "bigdabun.firebaseapp.com",
      databaseURL: "https://bigdabun-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "bigdabun",
      storageBucket: "bigdabun.firebasestorage.app",
      messagingSenderId: "393792537450",
      appId: "1:393792537450:web:7f2a90296b69058f8b9b13",
      measurementId: "G-ZDQPP6TYTE"
    };

    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxzvCeCidpIBm3Ez_AbmzTRrvzCkPa_7x-irAazDPzljPmuqjjHZOqXxfyS1vNh7tX1/exec';

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app); // Realtime DB 초기화

    let currentUser = null;
    let selectedElement = null;
    let dbRefInstance = null;

    const authInputsDiv = document.getElementById('auth-inputs-div');
    const emailInput = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');
    const loginBtn = document.getElementById('loginBtn');
    const registerBtn = document.getElementById('registerBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const userInfo = document.getElementById('user-info');
    const elementButtons = document.querySelectorAll('.btn-element');
    const voiceSelect = document.getElementById('voiceSelect');
    const speedInput = document.getElementById('speedInput');
    const makeBtn = document.getElementById('makeBtn');
    const saveBtn = document.getElementById('saveBtn');
    const statusBox = document.getElementById('status');
    const resultBox = document.getElementById('resultBox');
    const resultTitle = document.getElementById('resultTitle');
    const aiResponseText = document.getElementById('aiResponseText');
    const audioPlayer = document.getElementById('audioPlayer');
    const downloadLink = document.getElementById('downloadLink');
    const myStorageList = document.getElementById('my-storage-list');

    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        userInfo.textContent = `🟢 계정: ${user.email}`;
        authInputsDiv.classList.add('hidden'); 
        logoutBtn.classList.remove('hidden');  
        if(selectedElement) saveBtn.disabled = false;
        
        listenToStorage(user.uid);
      } else {
        currentUser = null;
        userInfo.textContent = '로그인 후 나만의 원소 보관함을 연동해보세요!';
        authInputsDiv.classList.remove('hidden'); 
        logoutBtn.classList.add('hidden');
        saveBtn.disabled = true;
        myStorageList.textContent = '로그인이 필요합니다.';
      }
    });

    registerBtn.addEventListener('click', () => {
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      if(!email || !password) return alert('이메일과 비밀번호를 모두 입력해 주세요.');

      createUserWithEmailAndPassword(auth, email, password)
        .then(() => { alert('회원가입 완료 및 로그인 성공!'); clearInputs(); })
        .catch((error) => alert('가입 실패! ' + error.message));
    });

    loginBtn.addEventListener('click', () => {
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      if(!email || !password) return alert('이메일과 비밀번호를 모두 입력해 주세요.');

      signInWithEmailAndPassword(auth, email, password)
        .then(() => { statusBox.textContent = '로그인되었습니다.'; clearInputs(); })
        .catch((error) => alert('로그인 실패! 정보를 확인해 주세요.'));
    });

    logoutBtn.addEventListener('click', () => {
      signOut(auth).then(() => {
        audioPlayer.removeAttribute('src');
        resultBox.classList.add('hidden');
        statusBox.textContent = '로그아웃 되었습니다.';
      });
    });

    function clearInputs() { emailInput.value = ''; passwordInput.value = ''; }

    elementButtons.forEach(btn => {
      btn.addEventListener('click', (e) => {
        elementButtons.forEach(b => b.classList.remove('active'));
        const target = e.currentTarget;
        target.classList.add('active');
        selectedElement = { symbol: target.dataset.symbol, name: target.dataset.name };
        statusBox.textContent = `선택된 원소: ${selectedElement.name} (${selectedElement.symbol})`;
        makeBtn.disabled = false;
        if (currentUser) saveBtn.disabled = false;
      });
    });

    // 🔗 Realtime Database 실시간 동기화 리스너 구문으로 변환
    function listenToStorage(uid) {
      const userElementsRef = ref(db, 'users/' + uid + '/elements');
      onValue(userElementsRef, (snapshot) => {
        const data = snapshot.val();
        if (data && Array.isArray(data)) {
          myStorageList.textContent = data.join(', ');
        } else {
          myStorageList.textContent = '보관함이 비어있습니다.';
        }
      });
    }

    // 🔗 Realtime Database 세팅용 저장 구문으로 변환
    saveBtn.addEventListener('click', async () => {
      if (!currentUser || !selectedElement) return;

      const userElementsRef = ref(db, 'users/' + currentUser.uid + '/elements');
      try {
        const snapshot = await get(userElementsRef);
        let currentElements = snapshot.exists() ? snapshot.val() : [];
        if (!Array.isArray(currentElements)) currentElements = [];

        const elementText = `${selectedElement.name}(${selectedElement.symbol})`;
        if (!currentElements.includes(elementText)) {
          currentElements.push(elementText);
          await set(userElementsRef, currentElements);
          statusBox.textContent = `⭐ ${selectedElement.name} 보관함 저장 완료!`;
        } else {
          statusBox.textContent = `ℹ️ 이미 저장된 원소입니다.`;
        }
      } catch (error) {
        alert('저장 실패: ' + error.message);
      }
    });

    async function makeSpeech() {
      if (!selectedElement) return;
      const voice = voiceSelect.value;
      const speed = Number(speedInput.value || 1.0);
      const aiPrompt = `원소 '${selectedElement.name}(${selectedElement.symbol})'에 대한 정의와 우리 일상 속 쓰임새를 핵심만 아주 흥미롭게 딱 두 문장으로 설명해줘.`;

      try {
        setLoading(true);
        resultBox.classList.add('hidden');
        statusBox.textContent = `🤖 AI 도슨트가 가이드를 생성하는 중입니다...`;

        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ type: 'tts', text: aiPrompt, model: 'tts-1', voice: voice, speed: speed })
        });

        const data = await response.json();
        if (data.error) throw new Error(data.error);
        if (!data.audioBase64) throw new Error('음성 데이터를 받지 못했습니다.');

        aiResponseText.textContent = data.aiText || `${selectedElement.name} 안내용 오디오 브리핑이 준비되었습니다.`;
        resultTitle.textContent = `🤖 AI 도슨트 가이드 : ${selectedElement.name} (${selectedElement.symbol})`;

        const audioUrl = base64ToAudioUrl(data.audioBase64, 'audio/mpeg');
        audioPlayer.src = audioUrl;
        downloadLink.href = audioUrl;
        downloadLink.download = makeFileName(selectedElement.symbol);
        
        resultBox.classList.remove('hidden');
        statusBox.textContent = '🔊 가이드 준비 완료!';
        audioPlayer.play().catch(() => console.log("자동재생 차단됨"));
      } catch (error) {
        console.error(error);
        statusBox.textContent = '요청 실패';
        alert('오류 발생: ' + error.message);
      } finally {
        setLoading(false);
      }
    }

    function base64ToAudioUrl(base64, mimeType) {
      const byteCharacters = atob(base64);
      const byteArrays = [];
      for (let offset = 0; offset < byteCharacters.length; offset += 512) {
        const slice = byteCharacters.slice(offset, offset + 512);
        const byteNumbers = new Array(slice.length);
        for (let i = 0; i < slice.length; i++) { byteNumbers[i] = slice.charCodeAt(i); }
        const byteArray = new Uint8Array(byteNumbers);
        byteArrays.push(byteArray);
      }
      return URL.createObjectURL(new Blob(byteArrays, { type: mimeType }));
    }

    function makeFileName(symbol) {
      const now = new Date();
      return `AI-Docent-${symbol}-${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}.mp3`;
    }

    function setLoading(isLoading) {
      makeBtn.disabled = isLoading;
      makeBtn.textContent = isLoading ? '가이드 생성 중...' : '🤖 AI 도슨트 설명 듣기';
    }
  </script>
</body>
</html>
